column_width = 120
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
# This codebase uses the compact `if cond then return end` guard idiom pervasively; collapse
# conditionals to keep it, but leave single-statement functions as written (don't one-line them).
collapse_simple_statement = "ConditionalOnly"
